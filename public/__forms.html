<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="booking-notification" method="POST" data-netlify="true" data-netlify-honeypot="companyWebsite" hidden>
      <input type="hidden" name="form-name" value="booking-notification">
      <input type="text" name="companyWebsite">
      <input type="text" name="firstName">
      <input type="text" name="lastName">
      <input type="email" name="email">
      <input type="tel" name="phone">
      <input type="text" name="eventType">
      <input type="text" name="eventDate">
      <input type="text" name="eventTime">
      <input type="text" name="location">
      <input type="text" name="guestCount">
      <input type="text" name="budget">
      <textarea name="message"></textarea>
      <input type="text" name="smsEmailConsent">
      <input type="text" name="source">
      <input type="url" name="pageUrl">
      <input type="text" name="submittedAt">
    </form>
  </body>
</html>
